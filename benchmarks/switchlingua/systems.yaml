    language_identifier_backend: transcriber
    code_switching: true

whisper_native:
  description: Naive whole-file official Whisper baseline with auto language detection.
  mode: whisper_baseline
  overrides: {}

whisper_native_fixed:
  description: Naive whole-file official Whisper baseline forced to the primary manifest language.
  mode: whisper_baseline
  fixed_primary_language: true
  overrides: {}

whisper_mlx_native:
  description: Naive whole-file MLX Whisper baseline with auto language detection on macOS.
  mode: whisper_mlx_baseline
  overrides: {}

whisper_mlx_native_fixed:
  description: Naive whole-file MLX Whisper baseline forced to the primary manifest language on macOS.
  mode: whisper_mlx_baseline
  fixed_primary_language: true
  overrides: {}

whisper_mms_naive:
