  overrides:
    transcriber_backend: auto
    language_identifier_backend: mms
    code_switching: false

whisper_native_naive:
  description: Whisper backend with native language identification and single-pass transcription.
  overrides:
    transcriber_backend: auto
    language_identifier_backend: transcriber
    code_switching: false
