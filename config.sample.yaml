batch_dir: "./input/"

#device: auto
#asr_backend: qwen
#language_backend: mms
#language_model: facebook/mms-lid-126
#asr_model: Qwen/Qwen3-ASR-1.7B
#vad_backend: ast
#noise_model: MIT/ast-finetuned-audioset-10-10-0.4593
#voxtral_max_new_tokens: 512
#code_switching: false

include:
  filename: ["*.wav", "*.mp3", "*.m4a"]
ignore: []
recursive: false
skip_existing: true
outdir: "./output/"
output:
  files: [txt]
  format:
    timestamp: minute
    speaker: change
    probability: line
    language: change
languages: [fr, en]
diarize: "pyannote"

profiles:
  # Stereo wav/mp3: split channels (host on one side), no diarization beyond per-channel labeling
  - include:
      filename: ["*.wav", "*.mp3"]
    # HOST on left channel, diarize on right
    diarize: "0=channel?speaker=HOST;pyannote"
  - include:
      filename: ["*.m4a"]
    # HOST on left channel, diarize on right
    diarize: "pyannote"
